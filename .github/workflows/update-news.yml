name: Update news feed

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "feeds.js"
      - "scripts/fetch-news.js"
      - ".github/workflows/update-news.yml"

permissions:
  contents: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch news
        run: node scripts/fetch-news.js

      - name: Commit news.json if changed
        run: |
          git config user.name "nexus-news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add news.json
          git diff --cached --quiet || git commit -m "Update news feed"
          git push
